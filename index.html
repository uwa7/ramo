<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Links</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="container">

<div class="header">
<h1>My Socials</h1>

<div>
<button onclick="darkMode()">Dark</button>
<button onclick="lightMode()">Light</button>
</div>
</div>


<div class="card">
<div>
<h2>WhatsApp</h2>
<p>01122630198</p>
</div>

<button class="copy" onclick="copyText('01122630198')">
Copy WhatsApp
</button>
</div>



<div class="card">
<div>
<h2>Instagram</h2>
<p>_ramadan.090</p>
</div>

<button class="copy" onclick="copyText('_ramadan.090')">
Copy Insta
</button>
</div>



<div class="card">
<div>
<h2>TikTok</h2>
<p>_ahmedramadan0</p>
</div>

<button class="copy" onclick="copyText('_ahmedramadan0')">
Copy TikTok
</button>
</div>


<div id="msg"></div>

</div>


<script>

function copyText(text){
navigator.clipboard.writeText(text);

msg.innerHTML="Copied ✔";

setTimeout(()=>{
msg.innerHTML="";
},1000);
}


function darkMode(){
document.body.className="dark";
}


function lightMode(){
document.body.className="light";
}

</script>


</body>
</html>
